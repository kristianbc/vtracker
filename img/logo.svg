<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <!-- Transparent background -->

  <!-- Radar icon -->
  <g transform="translate(80,100)">
    <!-- outer ring -->
    <circle r="60" stroke="#ffffff" stroke-width="6" fill="none" opacity="0.9"></circle>
    
    <!-- inner rings -->
    <circle r="40" stroke="#ffffff" stroke-width="4" fill="none" opacity="0.6"></circle>
    <circle r="20" stroke="#ffffff" stroke-width="3" fill="none" opacity="0.5"></circle>

    <!-- radar sweep -->
    <path d="M0 0 L0 -60 A60 60 0 0 1 52 30 Z" fill="#ffffff" opacity="0.15"></path>

    <!-- center -->
    <circle r="5" fill="#ffffff"></circle>
  </g>

  <!-- Text -->
  <text x="170" y="110" font-family="Arial, sans-serif" font-size="64" fill="#ffffff" letter-spacing="1">
    flightsimradar<tspan fill="#ffcc00">24</tspan>
  </text>

  <text x="172" y="145" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" opacity="0.85" letter-spacing="2">
    VATSIM LIVE TRAFFIC
  </text>
</svg>