<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightSimRadar24: Live Vatsim Tracker - RealTime Vatsim Tracker Map</title>
<link rel="icon" href="img/logo_fav.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
:root{--bg:#0a0e17;--panel:#0d1320;--border:#1e2d45;--accent:#00d4ff;--accent2:#ff6b35;--green:#39ff14;--text:#c8d8e8;--muted:#4a6080;
  --fr-bg:#1a1a1a;--fr-border:#2e2e2e;--fr-text:#e0e0e0;--fr-muted:#888;--fr-hover:#2a2a2a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Barlow Condensed',sans-serif;color:var(--text);overflow:hidden;height:100vh;width:100vw}
#map{width:100%;height:100%}
.maplibregl-ctrl-bottom-left,.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-top-left,.maplibregl-ctrl-top-right{display:none}

/* ─── TOP FADE OVERLAY ─────────────────────────────────────────────────────── */
#top-fade{position:absolute;top:-36px;left:0;right:0;height:160px;background:linear-gradient(to bottom,#1a1a1a 0%,rgba(26,26,26,0.95) 30%,rgba(26,26,26,0.65) 60%,rgba(26,26,26,0.2) 85%,transparent 100%);z-index:99;pointer-events:none}

/* ─── NAVBAR — transparent, 3-column layout ─────────────────────────────── */
#topbar{position:absolute;top:0;left:0;right:0;height:72px;background:transparent;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 24px;z-index:1000;gap:0}
#nav-left{display:flex;align-items:center}
#nav-logo{display:flex;align-items:center;justify-content:center;text-decoration:none}
#nav-logo img{height:68px;width:auto;filter:drop-shadow(0 2px 14px rgba(0,0,0,.85))}
#nav-right{display:flex;align-items:center;justify-content:flex-end;gap:10px}
#nav-utc{font-family:'Open Sans',sans-serif;font-weight:400;color:#fff;white-space:nowrap;text-shadow:0 1px 5px rgba(0,0,0,.9);flex-shrink:0;margin-right:19px;display:flex;align-items:baseline;gap:4px}
#nav-utc .utc-time{font-size:17px;letter-spacing:.5px}
#nav-utc .utc-label{font-size:12px;letter-spacing:1.5px;opacity:1}
#nav-search-wrap{position:relative;width:281px}
#nav-search-wrap .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#999;pointer-events:none;flex-shrink:0}
#nav-search-wrap .search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#fff;border:1px solid #ccc;border-radius:4px;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;font-family:'Open Sans',sans-serif;pointer-events:none;line-height:1;padding:0}
#si{width:100%;background:#fff;border:none;color:#222;padding:8px 34px 8px 36px;font-family:'Open Sans',sans-serif;font-size:14px;outline:none;border-radius:8px;box-shadow:0 1px 8px rgba(0,0,0,.35);transition:box-shadow .15s}
#si::placeholder{color:#aaa;font-size:14px}
#si:focus{box-shadow:0 2px 16px rgba(0,0,0,.45)}
#search-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:4px;z-index:2000;box-shadow:0 8px 28px rgba(0,0,0,.2);overflow:hidden}
#search-dropdown.open{display:block}
.sdrop-section-title{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 4px;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:#aaa;font-family:'Open Sans',sans-serif}
.sdrop-section-title a{color:#e8a030;font-size:11px;text-transform:none;letter-spacing:0;cursor:pointer;text-decoration:none;font-family:'Open Sans',sans-serif}
.sdrop-section-title a:hover{text-decoration:underline}
.sdrop-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .1s;font-size:13px;color:#333;font-family:'Open Sans',sans-serif}
.sdrop-item:hover{background:#f5f5f5}
.sdrop-item svg{color:#bbb;flex-shrink:0}
#nav-menu-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;cursor:pointer;color:rgba(255,255,255,.7);transition:color .2s;flex-shrink:0;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
#nav-menu-btn:hover{color:#fff}
#nav-menu-btn svg{width:20px;height:20px}

/* ─── SIDE PANEL ───────────────────────────────────────────────────────────── */
#panel{position:absolute;top:58px;right:0;width:310px;height:calc(100vh - 58px);background:rgba(10,14,23,.97);border-left:1px solid var(--border);backdrop-filter:blur(16px);z-index:900;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
#panel.open{transform:translateX(0)}
.ph{padding:14px 16px 11px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.cs{font-size:24px;font-weight:700;color:#fff;letter-spacing:2px;font-family:'Share Tech Mono',monospace}
.act{font-size:11px;color:var(--accent);letter-spacing:1px;margin-top:2px}
#close-panel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;transition:color .2s;padding:2px}
#close-panel:hover{color:#fff}
.rrow{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
.apt{font-size:20px;font-weight:700;color:#fff;font-family:'Share Tech Mono',monospace}
.rar{flex:1;display:flex;align-items:center;gap:3px}
.rl{flex:1;height:1px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.rpl{color:var(--accent2);font-size:13px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.sc{background:var(--panel);padding:10px 14px}
.sc .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px}
.sc .sv{font-size:17px;font-family:'Share Tech Mono',monospace;color:#fff}
.sc .su{font-size:9px;color:var(--muted);margin-left:2px}
.st{padding:10px 16px 5px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border)}
.rt{padding:10px 16px;font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;line-height:1.7;word-break:break-all;overflow-y:auto;max-height:100px}
.tleg{margin:10px 16px;padding:9px 12px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.12);border-radius:3px;font-size:10px;color:var(--muted)}
.tb{height:2px;background:linear-gradient(90deg,#1a3a6e,#006fa8,#00b4d8,#00d8a0,#39ff14,#ffd700);border-radius:1px;margin-bottom:5px}
.tll{display:flex;justify-content:space-between;font-size:9px}

/* ─── LAYER TOGGLE ─────────────────────────────────────────────────────────── */
#ltog{position:absolute;top:68px;left:14px;z-index:950;display:flex;flex-direction:column;gap:3px}
.lb{background:rgba(10,14,23,.93);border:1px solid var(--border);color:var(--text);padding:5px 10px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-radius:3px;transition:all .2s;white-space:nowrap}
.lb.active{border-color:var(--accent);color:var(--accent)}
.lb:hover{border-color:var(--accent)}
.plane-el{cursor:pointer;display:block}
.plane-tooltip{position:fixed;pointer-events:none;z-index:800;display:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.plane-tooltip svg.tt-bg{position:absolute;top:0;left:0;width:100%;height:100%}
.plane-tooltip .tt-inner{position:absolute;top:0;left:0;right:0;color:#111;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:600;line-height:1;letter-spacing:.2px;padding:4px 9px;white-space:nowrap;display:flex;align-items:center;justify-content:center}#loading{position:absolute;inset:0;background:var(--bg);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.radar{position:relative;width:100px;height:100px}
.radar::before,.radar::after{content:'';position:absolute;border-radius:50%;border:1px solid var(--accent)}
.radar::before{inset:0;opacity:.25}
.radar::after{inset:18px;opacity:.45}
.sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 295deg,rgba(0,212,255,.45) 360deg);animation:sw 2s linear infinite}
@keyframes sw{to{transform:rotate(360deg)}}
.rdot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:var(--accent);border-radius:50%;box-shadow:0 0 10px var(--accent)}
#lt{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:3px;animation:bk 1s infinite}
@keyframes bk{50%{opacity:.25}}
#notif{position:absolute;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,14,23,.96);border:1px solid var(--accent);color:var(--text);padding:7px 18px;border-radius:3px;font-size:12px;z-index:1100;transition:transform .3s;white-space:nowrap}
#notif.show{transform:translateX(-50%) translateY(0)}
#trail-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:400}
</style>
</head>
<body>
<div id="loading">
  <div class="radar"><div class="sweep"></div><div class="rdot"></div></div>
  <div id="lt">CONNECTING...</div>
  <div id="lp" style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;display:none">0 / 0</div>
</div>
<div id="map"></div>
<canvas id="trail-canvas"></canvas>
<div id="topbar">
  <!-- Left: empty spacer -->
  <div id="nav-left"></div>
  <!-- Center: logo -->
  <a id="nav-logo" href="#">
    <img src="img/logo.svg" alt="Logo">
  </a>
  <!-- Right: UTC + search + menu -->
  <div id="nav-right">
    <div id="nav-utc"><span class="utc-time">00:00</span><span class="utc-label">UTC</span></div>
    <div id="nav-search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="si" type="text" placeholder="Find flights, airports and more" autocomplete="off"/>
      <span class="search-kbd">/</span>
      <div id="search-dropdown">
        <div class="sdrop-section-title">
          <span>Search History</span>
          <a id="clear-history-btn">Clear history</a>
        </div>
        <div id="search-history-list"></div>
      </div>
    </div>
    <div id="nav-menu-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>
  </div>
</div>
<div id="top-fade"></div>
<div id="ltog">
  <button class="lb active" id="btn-sat" onclick="setLayer('sat')">🛰 SAT</button>
  <button class="lb" id="btn-dark" onclick="setLayer('dark')">🌑 DARK</button>
  <button class="lb" id="btn-osm" onclick="setLayer('osm')">🗺 OSM</button>
</div>
<div id="panel">
  <div id="p-loader" style="position:absolute;inset:0;background:var(--bg);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:15px;backdrop-filter:blur(10px)">
    <div class="radar" style="width:70px;height:70px"><div class="sweep"></div><div class="rdot"></div></div>
    <div style="font-size:12px;color:var(--accent);letter-spacing:3px;font-family:'Share Tech Mono',monospace;animation:bk 1.5s infinite">SYNCHRONIZING...</div>
  </div>
  <div class="ph">
    <div><div class="cs" id="p-cs">—</div><div class="act" id="p-ac">—</div></div>
    <button id="close-panel" onclick="closePanel()">✕</button>
  </div>
  <div class="rrow">
    <div><div class="apt" id="p-dep">—</div><div style="font-size:9px;color:var(--muted);margin-top:1px">DEP</div></div>
    <div class="rar"><div class="rl"></div><div class="rpl">✈</div><div class="rl"></div></div>
    <div style="text-align:right"><div class="apt" id="p-arr">—</div><div style="font-size:9px;color:var(--muted);margin-top:1px">ARR</div></div>
  </div>
  <div class="sg">
    <div class="sc"><div class="sl">Altitude</div><div class="sv" id="p-alt">—</div></div>
    <div class="sc"><div class="sl">Speed</div><div class="sv" id="p-spd">—<span class="su">kts</span></div></div>
    <div class="sc"><div class="sl">Heading</div><div class="sv" id="p-hdg">—<span class="su">°</span></div></div>
    <div class="sc"><div class="sl">Squawk</div><div class="sv" id="p-sqk">—</div></div>
    <div class="sc"><div class="sl">Lat</div><div class="sv" id="p-lat" style="font-size:12px">—</div></div>
    <div class="sc"><div class="sl">Lon</div><div class="sv" id="p-lon" style="font-size:12px">—</div></div>
  </div>
  <div class="st">Filed Route</div>
  <div class="rt" id="p-rt">No route filed</div>
  <div class="tleg">
    <div class="tb" style="background:linear-gradient(90deg,rgb(255,255,255),rgb(0,255,12),rgb(0,255,228),rgb(0,0,255),rgb(174,0,255),rgb(255,0,228),rgb(255,0,0))"></div>
    <div class="tll"><span>0m</span><span>3000m</span><span>6000m</span><span>9000m</span><span>11km</span><span>13km+</span></div>
    <div style="margin-top:5px;font-size:9px;color:var(--muted)">Trail color = altitude · white=ground · red=high</div>
  </div>
</div>
<div id="notif"></div>
<div class="plane-tooltip" id="tooltip"></div>

<script>
'use strict';

// ─── CONFIG ───────────────────────────────────────────────────────────────────
var VURL = 'https://data.vatsim.net/v3/vatsim-data.json';
var API_BASE = (window.VTRACKER_API_BASE || '').replace(/\/+$/, '');
var HISTORY_LIMIT = 4000;
var HISTORY_BATCH_LIMIT = 250;
var HISTORY_BATCH_SIZE = 12;
var HISTORY_CONCURRENCY = 3;
var PROXIES = [
  function(u){ return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u); },
  function(u){ return 'https://corsproxy.io/?url='+encodeURIComponent(u); },
  function(u){ return 'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u); }
];
var TILE_URLS = {
  sat:  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  dark: 'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
  osm:  'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
};

// ─── FETCH ────────────────────────────────────────────────────────────────────
function apiUrl(p){ return API_BASE ? API_BASE+p : p; }
async function doFetch(){
  if(API_BASE||location.protocol!=='file:'){
    try{var d=await fetch(apiUrl('/api/vatsim'),{cache:'no-store'});if(d.ok)return d;}catch(e){}
  }
  for(var i=0;i<PROXIES.length;i++){
    try{
      var c=new AbortController(),t=setTimeout(function(){c.abort();},8000);
      var r=await fetch(PROXIES[i](VURL),{signal:c.signal,cache:'no-store'});
      clearTimeout(t);if(r.ok)return r;
    }catch(e){}
  }
  throw new Error('all proxies failed');
}

// ─── MATH ─────────────────────────────────────────────────────────────────────
var D2R=Math.PI/180;
function deadReckon(lat,lon,hdg,kts,hrs){
  var d=kts*hrs;if(d<1e-5)return[lat,lon];
  var phi=lat*D2R,lam=lon*D2R,b=hdg*D2R,dr=d/3440.065;
  var phi2=Math.asin(Math.sin(phi)*Math.cos(dr)+Math.cos(phi)*Math.sin(dr)*Math.cos(b));
  var lam2=lam+Math.atan2(Math.sin(b)*Math.sin(dr)*Math.cos(phi),Math.cos(dr)-Math.sin(phi)*Math.sin(phi2));
  return[phi2/D2R,((lam2/D2R+540)%360)-180];
}

// ─── POSITION HISTORY ─────────────────────────────────────────────────────────
// gFixes[cs] = array of {lat,lon,alt,hdg,spd,t} — real VATSIM fixes only, ms timestamps
// No dead-reckoned points stored. Interpolation happens at display time only.
var gFixes = {};

function pushFix(cs, p, fallbackT) {
  if(!gFixes[cs]) gFixes[cs] = [];
  var fixes = gFixes[cs];
  // Prefer the pilot's own last_updated timestamp for accuracy; fall back to fetch time
  var t = fallbackT;
  if(p.last_updated) {
    var lu = Date.parse(p.last_updated);
    if(!isNaN(lu) && lu > 0) t = lu;
  }
  var last = fixes[fixes.length-1];
  // Ensure we always move forward in time and space
  if(last && (t <= last.t || (last.lat===p.latitude && last.lon===p.longitude))) return;
  fixes.push({lat:p.latitude, lon:p.longitude, alt:p.altitude||0, hdg:p.heading||0, spd:p.groundspeed||0, t:t});
  if(fixes.length > HISTORY_LIMIT) fixes.shift();
}

var PLAYBACK_LAG_MS = 20000; // 20 seconds lag to ensure smooth interpolation

// Compute true bearing from f1 to f2 using lat/lon positions
function bearingBetween(f1, f2) {
  var dLon = (f2.lon - f1.lon) * D2R;
  var lat1 = f1.lat * D2R, lat2 = f2.lat * D2R;
  var y = Math.sin(dLon) * Math.cos(lat2);
  var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
  return (Math.atan2(y, x) / D2R + 360) % 360;
}

// Interpolate between two GPS fixes
function interpolateFix(f1, f2, targetT) {
  var pct = Math.max(0, Math.min(1, (targetT - f1.t) / (f2.t - f1.t || 1)));

  // Lat/Lon
  var lat = f1.lat + (f2.lat - f1.lat) * pct;
  var lon = f1.lon + (f2.lon - f1.lon) * pct;
  if(Math.abs(f2.lon - f1.lon) > 180) {
    if(f2.lon > f1.lon) lon = (f1.lon + (f2.lon - 360 - f1.lon) * pct + 180) % 360 - 180;
    else lon = (f1.lon + (f2.lon + 360 - f1.lon) * pct + 180) % 360 - 180;
  }

  // Altitude
  var alt = f1.alt + (f2.alt - f1.alt) * pct;

  // Heading: derive from position delta (fixes from DB have hdg=0, so stored hdg is unreliable)
  var hdg;
  var dist = Math.abs(f2.lat - f1.lat) + Math.abs(f2.lon - f1.lon);
  if(dist > 0.0001) {
    hdg = bearingBetween(f1, f2);
  } else if(f1.hdg || f2.hdg) {
    var h1 = f1.hdg||0, h2 = f2.hdg||0;
    var diff = h2 - h1;
    while(diff > 180) diff -= 360;
    while(diff < -180) diff += 360;
    hdg = (h1 + diff * pct + 360) % 360;
  } else {
    hdg = 0;
  }

  return {lat:lat, lon:lon, alt:alt, hdg:hdg};
}

// Get aircraft position by interpolating the history trail
function getDeadReckonedPos(p, nowMs) {
  var cs = p.callsign;
  var fixes = gFixes[cs];
  if(!fixes || fixes.length === 0) {
    return {lat:p.latitude, lon:p.longitude, alt:p.altitude||0, hdg:p.heading||0};
  }

  var targetT = nowMs - PLAYBACK_LAG_MS;
  
  // If target is before our earliest data
  if(targetT <= fixes[0].t) {
    return {lat:fixes[0].lat, lon:fixes[0].lon, alt:fixes[0].alt, hdg:fixes[0].hdg};
  }

  // If target is beyond our latest data, dead-reckon from the last point.
  // Derive heading from the last two fixes (DB fixes have hdg=0, so position delta is more reliable).
  if(targetT >= fixes[fixes.length - 1].t) {
    var last = fixes[fixes.length - 1];
    var hdgUse = p.heading||0;
    if(fixes.length >= 2) {
      var prev = fixes[fixes.length - 2];
      var dist = Math.abs(last.lat - prev.lat) + Math.abs(last.lon - prev.lon);
      if(dist > 0.0001) hdgUse = bearingBetween(prev, last);
      else if(last.hdg) hdgUse = last.hdg;
    } else if(last.hdg) {
      hdgUse = last.hdg;
    }
    var elapsedHrs = Math.max(0, (targetT - last.t)) / 3600000;
    var dr = deadReckon(last.lat, last.lon, hdgUse, p.groundspeed||0, elapsedHrs);
    return {lat:dr[0], lon:dr[1], alt:last.alt, hdg:hdgUse};
  }

  // Find the two points to interpolate between (Scan from end for speed)
  var i = fixes.length - 2;
  while(i > 0 && fixes[i].t > targetT) i--;
  
  return interpolateFix(fixes[i], fixes[i+1], targetT);
}

// Trail = GPS fixes up to the current display time (lagged), so the marker always sits at the tip
// Returns [lat, lon, alt, t] — timestamp included so drawTrailCanvas can detect gaps.
function getTrail(cs) {
  var fixes = gFixes[cs] || [];
  var cutoff = Date.now() - PLAYBACK_LAG_MS;
  var result = [];
  for(var i = 0; i < fixes.length; i++) {
    if(fixes[i].t <= cutoff) result.push([fixes[i].lat, fixes[i].lon, fixes[i].alt, fixes[i].t]);
  }
  return result;
}

// ─── DB HISTORY ───────────────────────────────────────────────────────────────

function mergeHistoryPoints(cs, rows) {
  if(!rows||!rows.length) return;
  if(!gFixes[cs]) gFixes[cs] = [];
  var existing = gFixes[cs];
  var seen = Object.create(null);
  existing.forEach(function(f){ seen[f.t+'|'+f.lat+'|'+f.lon]=1; });

  var now = Date.now();
  var added = [];
  rows.forEach(function(r){
    if(typeof r.lat!=='number'||typeof r.lon!=='number') return;
    var t = Number(r.observed_at||r.t||0);
    if(t < 1e10) t = t * 1000; // seconds to ms
    if(t > now) t = now; // Cap future timestamps
    var key = t+'|'+r.lat+'|'+r.lon;
    if(seen[key]) return;
    seen[key] = 1;
    added.push({lat:r.lat, lon:r.lon, alt:Number(r.alt||r.altitude||0), hdg:0, spd:0, t:t});
  });

  var merged = existing.concat(added);
  merged.sort(function(a,b){return a.t-b.t;});
  // Ensure strict chronological order after merge (remove any non-forward steps if any)
  var finalFixes = [];
  for(var i=0; i<merged.length; i++) {
    var f = merged[i];
    if(i > 0 && f.t <= merged[i-1].t) continue; 
    finalFixes.push(f);
  }
  if(finalFixes.length > HISTORY_LIMIT) finalFixes = finalFixes.slice(finalFixes.length - HISTORY_LIMIT);

  // Remove outlier fixes: if a point is far from both its neighbors relative to the
  // time gap, it's a bad GPS fix. Max plausible speed ~700kts = ~0.2deg/s lat/lon.
  var cleaned = [];
  for(var i=0; i<finalFixes.length; i++){
    var f = finalFixes[i];
    var prev = finalFixes[i-1], next = finalFixes[i+1];
    if(prev && next){
      var dtPrev = (f.t - prev.t) / 1000; // seconds
      var dtNext = (next.t - f.t) / 1000;
      var maxDistPrev = Math.max(0.05, dtPrev * 0.22); // 0.22 deg/s ≈ 800kts
      var maxDistNext = Math.max(0.05, dtNext * 0.22);
      var dPrev = Math.abs(f.lat-prev.lat) + Math.abs(f.lon-prev.lon);
      var dNext = Math.abs(f.lat-next.lat) + Math.abs(f.lon-next.lon);
      // Skip if this point is implausibly far from BOTH neighbors
      if(dPrev > maxDistPrev && dNext > maxDistNext){ continue; }
    }
    cleaned.push(f);
  }

  gFixes[cs] = cleaned;
}

async function loadStoredHistory(cs){
  if(!cs||gHistoryLoaded[cs]||gHistoryLoading[cs]) return;
  if(!(API_BASE||location.protocol!=='file:')) return;
  gHistoryLoading[cs]=true;
  try{
    var r=await fetch(apiUrl('/api/history?callsign='+encodeURIComponent(cs)+'&limit='+HISTORY_LIMIT),{cache:'no-store'});
    if(!r.ok) return;
    var data=await r.json();
    mergeHistoryPoints(cs, data.points||[]);
    gHistoryLoaded[cs]=true;
    if(gSelected===cs) drawTrailCanvas();
  }catch(e){}finally{delete gHistoryLoading[cs];}
}

// Loads history for many planes concurrently during first start
async function loadAllHistoryBatch(callsigns) {
  var concurrency = 20; // Fast concurrent loading
  var queue = callsigns.slice();
  var total = queue.length;
  var count = 0;
  var lp = document.getElementById('lp');
  lp.style.display = 'block';
  document.getElementById('lt').textContent = 'SYNCHRONIZING HISTORY...';

  async function worker() {
    while(queue.length > 0) {
      var cs = queue.shift();
      if(!cs) continue;
      await loadStoredHistory(cs);
      count++;
      lp.textContent = count + ' / ' + total + ' AIRCRAFT';
    }
  }

  var workers = [];
  for(var i=0; i<concurrency; i++) workers.push(worker());
  await Promise.all(workers);
}

async function fetchAirportElev(icao) {
  if(!icao||icao==='----'||icao==='???')return;
  icao=icao.toUpperCase().trim();
  if(icao in gAirportElevFt||gAirportElevPending[icao])return;
  gAirportElevPending[icao]=true;
  try {
    // open-meteo elevation API — gives terrain elevation at lat/lon
    // First resolve ICAO to lat/lon via aviationweather.gov
    var r=await fetch('https://aviationweather.gov/api/data/airport?ids='+icao+'&format=json',{cache:'no-store'});
    if(!r.ok)throw new Error();
    var data=await r.json();
    if(data&&data[0]&&typeof data[0].elev==='number'){
      gAirportElevFt[icao]=data[0].elev;
    } else {
      gAirportElevFt[icao]=0;
    }
  } catch(e){
    gAirportElevFt[icao]=0;

  delete gAirportElevPending[icao];

  if(gSelected){
    var p=gPilots.get(gSelected);

    if(arr&&arr.toUpperCase()===icao){

  }
}

function trailColAlt(altFt){
  // Convert feet to metres, AAL (subtract arrival airport elevation)
  var altM=(altFt-gSelectedArrivalElev)*0.3048;
  if(altM<=0)return'rgb(255,255,255)';
  if(altM>=13000)return'rgb(255,0,0)';
  var lo=ALT_STOPS[0],hi=ALT_STOPS[ALT_STOPS.length-1];
  for(var i=0;i<ALT_STOPS.length-1;i++){
    if(altM>=ALT_STOPS[i][0]&&altM<=ALT_STOPS[i+1][0]){lo=ALT_STOPS[i];hi=ALT_STOPS[i+1];break;}
  }
  var f=(altM-lo[0])/(hi[0]-lo[0]||1);
  return'rgb('+Math.round(lo[1][0]+(hi[1][0]-lo[1][0])*f)+','+Math.round(lo[1][1]+(hi[1][1]-lo[1][1])*f)+','+Math.round(lo[1][2]+(hi[1][2]-lo[1][2])*f)+')';
}

// ─── TRAIL DRAW ───────────────────────────────────────────────────────────────
var gTrailPxCache=[];
var gHoveredDot=-1;
var MAX_GAP_MS = 5 * 60 * 1000; // gaps > 5 min = missing data, don't connect

// Chaikin subdivision in geo-space: repeatedly cuts corners by replacing each
// segment with two points at 25% and 75% along it. Produces smooth arcs with
// zero overshoot regardless of point spacing. Preserves first and last points.
function chaikinSmooth(pts, passes) {
  for(var p=0; p<passes; p++){
    var out=[pts[0]];
    for(var i=0; i<pts.length-1; i++){
      var a=pts[i], b=pts[i+1];
      out.push({
        lat: a.lat*0.75 + b.lat*0.25,
        lon: a.lon*0.75 + b.lon*0.25,
        alt: a.alt*0.75 + b.alt*0.25,
        t:   a.t
      });
      out.push({
        lat: a.lat*0.25 + b.lat*0.75,
        lon: a.lon*0.25 + b.lon*0.75,
        alt: a.alt*0.25 + b.alt*0.75,
        t:   b.t
      });
    }
    out.push(pts[pts.length-1]);
    pts=out;
  }
  return pts;
}

function drawTrailCanvas(){
  var ctx=gTrailCtx;
  ctx.clearRect(0,0,gTrailCanvas.width,gTrailCanvas.height);
  gTrailPxCache=[];
  if(!gSelected||!gMap) return;
  var nowMs=Date.now();
  var p=gPilots.get(gSelected);
  var trail=getTrail(gSelected);
  // Append lagged dead-reckoned position as trail tip
  if(p){
    var dr=getDeadReckonedPos(p,nowMs);
    var tipT=nowMs-PLAYBACK_LAG_MS;
    trail=trail.concat([[dr.lat,dr.lon,dr.alt,tipT]]);
  }
  if(trail.length<2) return;

  // Build contiguous segments (break on time gaps > 5 min)
  var rawSegs=[], seg=[];
  for(var i=0;i<trail.length;i++){
    if(i>0){
      var tA=trail[i-1][3], tB=trail[i][3];
      if(tA&&tB&&(tB-tA)>MAX_GAP_MS){if(seg.length)rawSegs.push(seg);seg=[];}
    }
    seg.push({lat:trail[i][0],lon:trail[i][1],alt:trail[i][2],t:trail[i][3]});
  }
  if(seg.length) rawSegs.push(seg);

  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=3; ctx.globalAlpha=0.5;
  var hoverCache=[];

  var STRAIGHT_THRESHOLD = 5; // degrees — below this = straight, no smoothing needed

  for(var s=0;s<rawSegs.length;s++){
    var raw=rawSegs[s];
    if(raw.length<2) continue;

    // Compute bearing change at each interior point
    function geoBearing(a, b){
      var dLon=(b.lon-a.lon)*D2R, la=a.lat*D2R, lb=b.lat*D2R;
      return (Math.atan2(Math.sin(dLon)*Math.cos(lb), Math.cos(la)*Math.sin(lb)-Math.sin(la)*Math.cos(lb)*Math.cos(dLon))/D2R+360)%360;
    }
    function bearingDiff(a, b){
      var d=Math.abs(a-b)%360; return d>180?360-d:d;
    }

    // Mark each point as "turning" if bearing change to/from it exceeds threshold
    var isTurning=new Array(raw.length).fill(false);
    for(var i=1;i<raw.length-1;i++){
      var bIn=geoBearing(raw[i-1],raw[i]);
      var bOut=geoBearing(raw[i],raw[i+1]);
      if(bearingDiff(bIn,bOut)>STRAIGHT_THRESHOLD){
        // Mark this point and its neighbors so the spline has context
        isTurning[i-1]=true; isTurning[i]=true; isTurning[i+1]=true;
      }
    }

    // Split into sub-runs: turning runs get Chaikin, straight runs draw as-is
    var i=0;
    while(i<raw.length-1){
      // Collect a contiguous run of the same type starting at i
      var turning=isTurning[i];
      var run=[raw[i]];
      var j=i+1;
      while(j<raw.length && isTurning[j]===turning){ run.push(raw[j]); j++; }
      // Include the last point of the run as start of next to avoid gaps
      if(j<raw.length) run.push(raw[j]);

      var smooth = (turning && run.length>=3) ? chaikinSmooth(run, 2) : run;
      var px=smooth.map(function(pt){ return gMap.project([pt.lon,pt.lat]); });

      for(var k=0;k<smooth.length-1;k++){
        ctx.beginPath();
        ctx.moveTo(px[k].x, px[k].y);
        ctx.lineTo(px[k+1].x, px[k+1].y);
        ctx.strokeStyle=trailColAlt((smooth[k].alt+smooth[k+1].alt)/2);
        ctx.stroke();
        if(k===0) hoverCache.push({x:px[k].x, y:px[k].y, alt:smooth[k].alt});
        hoverCache.push({x:px[k+1].x, y:px[k+1].y, alt:smooth[k+1].alt});
      }

      i=j;
    }
  }

  // Store full rendered point list for hover hit-testing
  gTrailPxCache = hoverCache;

  // Draw all rendered points (fix + interpolated) as uniform dots
  ctx.globalAlpha=1;
  for(var j=0;j<hoverCache.length;j++){
    var hp=hoverCache[j];
    ctx.beginPath(); ctx.arc(hp.x,hp.y,1.5,0,Math.PI*2);
    ctx.fillStyle=trailColAlt(hp.alt);
    ctx.fill();
  }
  // Hover highlight
  if(gHoveredDot>=0 && hoverCache[gHoveredDot]){
    var hp=hoverCache[gHoveredDot];
    ctx.beginPath(); ctx.arc(hp.x,hp.y,2.2,0,Math.PI*2);
    ctx.fillStyle='#ffffff';
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

// Trail hover — show altitude tooltip on hovered spline point
function onTrailMouseMove(mx,my){
  if(!gSelected||!gTrailPxCache.length){
    if(gHoveredDot!==-1){gHoveredDot=-1;drawTrailCanvas();hideTip();}
    return;
  }
  var hit=-1, hitR=100; // 10px radius
  for(var i=0;i<gTrailPxCache.length;i++){
    var dx=gTrailPxCache[i].x-mx, dy=gTrailPxCache[i].y-my, d2=dx*dx+dy*dy;
    if(d2<hitR){hit=i;hitR=d2;}
  }
  if(hit!==gHoveredDot){
    gHoveredDot=hit;
    drawTrailCanvas();
    if(hit>=0){
      var pt=gTrailPxCache[hit];
      var altFt=Math.round(pt.alt||0);
      var fl=Math.round(altFt/100);
      var altStr=fl>0?'FL'+(' 000'+fl).slice(-3):(altFt+' ft');
      gTooltip.innerHTML=altStr;
      gTooltip.style.display='block';
      gTooltip.style.left=(mx+14)+'px';
      gTooltip.style.top=(my-8)+'px';
    } else {
      hideTip();
    }
  }
}

      +' L '+r+' '+h

      +' L 0 '+r
      +' A '+r+' '+r+' 0 0 1 '+r+' 0'

function updateTipPos(){
  if(!gTooltip._lngLat||gTooltip.style.display==='none') return;
  var pos=gMap.project(gTooltip._lngLat);
  var w=parseFloat(gTooltip.style.width)||0;
  var h=parseFloat(gTooltip.style.height)||0;
  gTooltip.style.left=(pos.x-w/2)+'px';
  gTooltip.style.top=(pos.y-h-10)+'px';
}
function hideTip(){gTooltip.style.display='none';}

function getMarkerPos(cs, p, nowMs){
  var pos=getDeadReckonedPos(p, nowMs);
  return [pos.lon, pos.lat, pos.hdg];
}

function upsertMarker(cs, p){
  var nowMs=Date.now();
  var pos=getMarkerPos(cs,p,nowMs);
  var sel=(cs===gSelected);
  var hdg=Math.round(pos[2]/2)*2;
  // If fixes were just cleared (selection), the heading may snap to raw p.heading.
  // Prefer the last rendered heading to avoid a jarring rotation jump.
  if(gMarkers[cs] && sel && gFixes[cs] && gFixes[cs].length === 0){
    hdg = gMarkers[cs].lastHdg !== undefined ? gMarkers[cs].lastHdg : hdg;
  }
  if(gMarkers[cs]){
    gMarkers[cs].marker.setLngLat([pos[0],pos[1]]);
    gMarkers[cs].el.innerHTML=makePlaneHTML(hdg,sel,p);
    gMarkers[cs].lastHdg=hdg;
  } else {
    var el=document.createElement('div');
    el.innerHTML=makePlaneHTML(hdg,sel,p);
    el.style.cssText='cursor:pointer;display:block';
    el.addEventListener('mouseenter',function(){
      showTip(mk.getLngLat(), gPilots.get(cs)||p);
    });
    el.addEventListener('mouseleave',hideTip);
    el.addEventListener('click',function(e){e.stopPropagation();gMarkerClickFlag=true;selectPilot(cs);});
    var mk=new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([pos[0],pos[1]]).addTo(gMap);
    gMarkers[cs]={marker:mk,el:el,lastHdg:hdg};
  }
}
function removeMarker(cs){if(gMarkers[cs]){gMarkers[cs].marker.remove();delete gMarkers[cs];}}

// ─── STATE ────────────────────────────────────────────────────────────────────
var gMap=null;
var gPilots=new Map();
var gSelected=null;
var gFetchInt=5000, gFetchId=null, gAnimId=null, gLastFetch=0, gNT=null;
var gMissingFetches={}, gMissingFetchLimit=6;
var gMarkerClickFlag=false;
var gHistoryLoaded={}, gHistoryLoading={};
var gTrailCanvas=document.getElementById('trail-canvas');
var gTrailCtx=gTrailCanvas.getContext('2d');

function resizeTrailCanvas(){gTrailCanvas.width=window.innerWidth;gTrailCanvas.height=window.innerHeight;}
resizeTrailCanvas();
window.addEventListener('resize',function(){resizeTrailCanvas();drawTrailCanvas();});

var gInitialLoadDone=false;
// ─── LOAD ─────────────────────────────────────────────────────────────────────
async function load(){
  var rbtn=document.getElementById('refresh-btn'); if(rbtn) rbtn.disabled=true;
  try{
    var res=await doFetch(), data=await res.json(), pilots=data.pilots||[];
    var nowMs=Date.now();
    var newMap=new Map();
    pilots.forEach(function(p){newMap.set(p.callsign,p);gMissingFetches[p.callsign]=0;});

    // Remove gone planes
    Object.keys(gMarkers).forEach(function(cs){
      if(!newMap.has(cs)){
        gMissingFetches[cs]=(gMissingFetches[cs]||0)+1;
        if(gMissingFetches[cs]<gMissingFetchLimit) return;
        removeMarker(cs);
        delete gFixes[cs]; delete gHistoryLoaded[cs]; delete gHistoryLoading[cs];
        delete gMissingFetches[cs];
        if(gSelected===cs) closePanel();
      }
    });

    // If first load, wait for DB history AND then wait 20s for live data buffer
    if(!gInitialLoadDone) {
      await loadAllHistoryBatch(Array.from(newMap.keys()));
      
      // Record first snapshot of live data
      newMap.forEach(function(p,cs){ if(p.latitude&&p.longitude) pushFix(cs, p, nowMs); });

      document.getElementById('lt').textContent = 'GATHERING LIVE DATA...';
      var lp = document.getElementById('lp');
      lp.style.display = 'block';
      
      // Wait 20 seconds to get the "future" data segment
      for(var s=20; s>0; s--) {
        lp.textContent = 'READY IN ' + s + 's';
        await new Promise(r => setTimeout(r, 1000));
      }
      
      // Fetch second snapshot to establish the "future" path
      var res2=await doFetch(), data2=await res2.json();
      var nowMs2=Date.now();
      (data2.pilots||[]).forEach(function(p){ if(p.latitude&&p.longitude) pushFix(p.callsign, p, nowMs2); });
      
      gInitialLoadDone=true;
    }

    // Normal refresh cycle
    newMap.forEach(function(p,cs){
      if(!p.latitude&&!p.longitude) return;
      pushFix(cs, p, nowMs);
      upsertMarker(cs, p);
    });

    gPilots=newMap;
    gLastFetch=nowMs;
    document.getElementById('sp') && (document.getElementById('sp').textContent=pilots.length.toLocaleString());
    document.getElementById('sa') && (document.getElementById('sa').textContent=(data.controllers||[]).length.toLocaleString());
    // last-update display removed (UTC clock in navbar)
    if(gSelected){var sp=gPilots.get(gSelected);if(sp)fillPanel(sp);}
    
    document.getElementById('loading').style.display='none';
    showNotif('✓ '+pilots.length+' aircraft synchronized');
  }catch(e){
    document.getElementById('loading').style.display='none';
    showNotif('⚠ VATSIM unreachable — retrying');console.error(e);
  }
  if(rbtn) rbtn.disabled=false;
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animLoop(){
  function frame(){
    var nowMs=Date.now();
    var pct=Math.min(1,(nowMs-gLastFetch)/gFetchInt);
    var _cbar=document.getElementById('cbar'); if(_cbar) _cbar.style.width=(100-pct*100)+'%';

    // Move every marker to dead-reckoned position
    gPilots.forEach(function(p,cs){
      if(!gMarkers[cs]) return;
      var pos=getMarkerPos(cs,p,nowMs);
      gMarkers[cs].marker.setLngLat([pos[0],pos[1]]);
      var hdg=Math.round(pos[2]/2)*2;
      if(gMarkers[cs].lastHdg!==hdg||gMarkers[cs].lastSel!==(cs===gSelected)){
        gMarkers[cs].lastHdg=hdg;
        gMarkers[cs].lastSel=(cs===gSelected);
        gMarkers[cs].el.innerHTML=makePlaneHTML(hdg,cs===gSelected,p);
      }
    });

    // Redraw trail and update panel coords for selected plane
    if(gSelected){
      var sp=gPilots.get(gSelected);
      if(sp){
        var dr=getDeadReckonedPos(sp,nowMs);
        document.getElementById('p-lat').textContent=dr.lat.toFixed(4);
        document.getElementById('p-lon').textContent=dr.lon.toFixed(4);
      }
      drawTrailCanvas();
    }
    gAnimId=requestAnimationFrame(frame);
  }
  gAnimId=requestAnimationFrame(frame);
}

// ─── SELECT / PANEL ───────────────────────────────────────────────────────────
async function selectPilot(cs){
  hideTip();
  if(gSelected&&gMarkers[gSelected]){var op=gPilots.get(gSelected);if(op)upsertMarker(gSelected,op);}
  gSelected=cs;
  var p=gPilots.get(cs); if(!p) return;
  
  // Show initialization state
  document.getElementById('p-loader').style.display='flex';
  document.getElementById('panel').classList.add('open');
  
  delete gFixes[cs]; // Clear and start fresh
  gHistoryLoaded[cs]=false;
  updateSelectedArrivalElev(p);
  
  // Wait for history points from database
  await loadStoredHistory(cs);
  
  // Now that points are present, finalize initialization
  document.getElementById('p-loader').style.display='none';
  upsertMarker(cs,p);
  fillPanel(p);
  drawTrailCanvas();
  
  // Pan to aircraft
  gMap.easeTo({center:[p.longitude,p.latitude],duration:400});
}
function fillPanel(p){
  var fp=p.flight_plan;
  document.getElementById('p-cs').textContent=p.callsign;
  document.getElementById('p-ac').textContent=(fp&&(fp.aircraft_short||fp.aircraft))||'Unknown Aircraft';
  document.getElementById('p-dep').textContent=(fp&&fp.departure)||'—';
  document.getElementById('p-arr').textContent=(fp&&fp.arrival)||'—';
  var fl=Math.round((p.altitude||0)/100);
  document.getElementById('p-alt').textContent=fl>0?'FL'+('000'+fl).slice(-3):((p.altitude||0)+' ft');
  document.getElementById('p-spd').innerHTML=(p.groundspeed||0)+'<span class="su">kts</span>';
  document.getElementById('p-hdg').innerHTML=(p.heading||0)+'<span class="su">°</span>';
  document.getElementById('p-sqk').textContent=p.transponder||'—';
  document.getElementById('p-lat').textContent=p.latitude?p.latitude.toFixed(4):'—';
  document.getElementById('p-lon').textContent=p.longitude?p.longitude.toFixed(4):'—';
  document.getElementById('p-rt').textContent=(fp&&fp.route)||'No route filed';
}
function closePanel(){
  if(gSelected&&gMarkers[gSelected]){var p=gPilots.get(gSelected);if(p)upsertMarker(gSelected,p);}
  gSelected=null;
  gSelectedArrivalElev=0;
  document.getElementById('panel').classList.remove('open');
  drawTrailCanvas();
}

// ─── MAP ──────────────────────────────────────────────────────────────────────
async function initMap(){
  gMap=new maplibregl.Map({
    container:'map',
    style:{
      version:8,
      glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
      sources:{tiles:{type:'raster',tiles:[TILE_URLS.sat],tileSize:256,attribution:'Tiles © Esri'}},
      layers:[{id:'bg',type:'background',paint:{'background-color':'#000'}},{id:'tiles',type:'raster',source:'tiles',paint:{'raster-fade-duration':0}}]
    },
    center:[0,20],zoom:2,minZoom:1,maxZoom:18,
    attributionControl:false,dragRotate:false,
    scrollZoom:{speed:0.15,smooth:true}
  });
  gMap.touchZoomRotate&&gMap.touchZoomRotate.disableRotation();
  gMap.on('render',drawTrailCanvas);
  gMap.on('render',updateTipPos);
  gMap.on('zoom',updateTipPos);
  gMap.on('move',updateTipPos);
  gMap.on('mousemove',function(e){onTrailMouseMove(e.point.x,e.point.y);});
  gMap.on('mouseout',function(){if(gHoveredDot!==-1){gHoveredDot=-1;drawTrailCanvas();}});
  gMap.on('click',function(e){if(gMarkerClickFlag){gMarkerClickFlag=false;return;}if(gSelected)closePanel();});
  gMap.getCanvas().style.cursor='pointer';
  await load();
  gFetchId=setInterval(load,gFetchInt);
  animLoop();
}

// ─── LAYER SWITCH ─────────────────────────────────────────────────────────────
function setLayer(t){
  document.querySelectorAll('.lb').forEach(function(b){b.classList.remove('active');});
  document.getElementById('btn-'+t).classList.add('active');
  if(!gMap) return;
  gMap.getSource('tiles').setTiles([TILE_URLS[t]]);
}

// ─── UTC CLOCK ────────────────────────────────────────────────────────────────
function updateClock(){
  var now=new Date();
  var h=('0'+now.getUTCHours()).slice(-2);
  var m=('0'+now.getUTCMinutes()).slice(-2);
  document.querySelector('#nav-utc .utc-time').textContent=h+':'+m;
}
updateClock();
setInterval(updateClock,10000);

// ─── SEARCH HISTORY ───────────────────────────────────────────────────────────
var gSearchHistory=JSON.parse(localStorage.getItem('vsearch')||'[]');
function saveHistory(q){
  gSearchHistory=gSearchHistory.filter(function(x){return x!==q;});
  gSearchHistory.unshift(q);
  if(gSearchHistory.length>8)gSearchHistory=gSearchHistory.slice(0,8);
  localStorage.setItem('vsearch',JSON.stringify(gSearchHistory));
}
function renderHistory(){
  var list=document.getElementById('search-history-list');
  list.innerHTML='';
  var items=gSearchHistory.slice(0,5);
  items.forEach(function(q){
    var d=document.createElement('div');
    d.className='sdrop-item';
    d.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+q;
    d.addEventListener('mousedown',function(e){e.preventDefault();document.getElementById('si').value=q;hideDropdown();doSearch();});
    list.appendChild(d);
  });
}
function showDropdown(){renderHistory();document.getElementById('search-dropdown').classList.add('open');}
function hideDropdown(){document.getElementById('search-dropdown').classList.remove('open');}
var _siEl=document.getElementById('si');
var _kbdEl=document.querySelector('.search-kbd');
_siEl.addEventListener('focus',function(){showDropdown();if(_kbdEl)_kbdEl.style.display='none';});
_siEl.addEventListener('blur',function(){setTimeout(hideDropdown,150);if(_kbdEl)_kbdEl.style.display='';});
document.getElementById('clear-history-btn').addEventListener('click',function(){gSearchHistory=[];localStorage.removeItem('vsearch');renderHistory();});
document.addEventListener('keydown',function(e){if(e.key==='/'&&document.activeElement!==_siEl){e.preventDefault();_siEl.focus();}});

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function doSearch(){
  var q=document.getElementById('si').value.trim().toUpperCase(); if(!q) return;
  saveHistory(q);
  var hit=gPilots.get(q);
  if(!hit) gPilots.forEach(function(p,cs){if(!hit&&cs.indexOf(q)!==-1)hit=p;});
  if(hit){
    gMap.easeTo({center:[hit.longitude,hit.latitude],zoom:9,duration:600});
    selectPilot(hit.callsign);
  } else showNotif('⚠ Not found: '+q);
}
document.getElementById('si').addEventListener('keydown',function(e){if(e.key==='Enter'){hideDropdown();doSearch();}});
function showNotif(m){var el=document.getElementById('notif');el.textContent=m;el.classList.add('show');clearTimeout(gNT);gNT=setTimeout(function(){el.classList.remove('show');},3500);}
function doRefresh(){clearInterval(gFetchId);load();gFetchId=setInterval(load,gFetchInt);}

initMap();

</script>
